<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <title>おくすり ぼうけんのしょ！💊</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <script src="list.js"></script>
  
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #f7f9fc; color: #333;
      text-align: center;
    }
    .view { display: none; padding: 20px; min-height: 100vh; }
    .active-view { display: block; }
    h1, h2 { color: #2c3e50; margin-top: 20px; }
    p { font-size: 1.1rem; line-height: 1.5; color: #555; }

    .btn {
      display: inline-block; margin: 15px auto;
      padding: 15px 30px; font-size: 1.3rem; font-weight: bold;
      color: white; border-radius: 20px; cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,0.15); transition: all 0.1s;
      border: none; max-width: 90%; width: 320px;
    }
    .btn-camera { background-color: #ff9800; box-shadow: 0 6px 0 #e65100; }
    .btn-camera:active { transform: translateY(4px); box-shadow: 0 2px 0 #e65100; }
    .btn-dictionary { background-color: #8e44ad; box-shadow: 0 6px 0 #732d91; margin-bottom: 20px;}
    .btn-dictionary:active { transform: translateY(4px); box-shadow: none; }
    .btn-copy { background-color: #3498db; padding: 10px 20px; font-size: 1rem; border-radius: 10px; box-shadow: 0 4px 0 #2980b9; margin-top: 10px;}
    
    .spinner {
      border: 6px solid #f3f3f3; border-top: 6px solid #3498db;
      border-radius: 50%; width: 50px; height: 50px;
      animation: spin 1s linear infinite; margin: 30px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .med-card {
      background: white; border-radius: 15px; padding: 20px;
      margin: 15px auto; max-width: 400px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .url-input { width: 100%; padding: 10px; font-size: 0.9rem; background-color: #f1f2f6; border: 1px solid #dcdde1; border-radius: 5px; color: #7f8c8d; }

    /* ★RPGステータス表示：緑〜青のポップな大冒険グラデーション */
    .rpg-status {
      background: linear-gradient(135deg, #34e89e, #0f3443); 
      color: white; 
      padding: 15px; border-radius: 15px; margin: 10px auto 30px auto;
      max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 3px solid #f1c40f; 
    }
    .rpg-level { font-size: 2.2rem; font-weight: 900; color: #f1c40f; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);} 
    .rpg-title { font-size: 1.4rem; margin: 5px 0 0 0; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
    
    .rarity-label { font-size: 2rem; font-weight: 900; margin: 10px 0; text-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
    .child-comment { font-size: 1.4rem; font-weight: bold; margin: 10px auto 20px auto; padding: 20px; border-radius: 15px; max-width: 400px;}
    
    .new-badge {
      display: inline-block; background-color: #e74c3c; color: white;
      font-size: 1.2rem; font-weight: bold; padding: 8px 15px; border-radius: 20px;
      animation: bounce 1s infinite; margin-bottom: 10px; border: 2px solid white;
    }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    .dict-grid { display: grid; grid-template-columns: 1fr; gap: 10px; max-width: 500px; margin: 0 auto; text-align: left; }
    .dict-item { padding: 15px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; display: flex; align-items: center; justify-content: flex-start; }
    .dict-locked { background-color: #ecf0f1; color: #95a5a6; border: 2px dashed #bdc3c7; }
    .dict-unlocked-N { background-color: #fff3e0; color: #d35400; border: 2px solid #e67e22; }
    .dict-unlocked-R { background-color: #e8f8f5; color: #16a085; border: 2px solid #1abc9c; }
    .dict-unlocked-SR { background-color: #f8c471; color: #c0392b; border: 2px solid #e67e22; }
    .dict-unlocked-UR { background-color: #ffd700; color: #c0392b; border: 4px solid #ff4500; }
    .rarity-tag { display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: 0.9rem; margin-right: 10px; color: white; }
    .tag-N { background-color: #e67e22; } .tag-R { background-color: #1abc9c; } .tag-SR { background-color: #e67e22; } .tag-UR { background-color: #ff4500; }
  </style>
</head>
<body>

  <div id="loading-view" class="view active-view">
    <h2>じゅんび中... ⏳</h2>
    <div class="spinner"></div>
  </div>

  <div id="task-view" class="view">
    <h1>ぼうけんの しょ 🛡️</h1>
    
    <div class="rpg-status">
      <p class="rpg-level">Lv.<span id="top-level">1</span></p>
      <p class="rpg-title" id="top-title">みならい ゆうしゃ</p>
    </div>

    <button class="btn btn-dictionary" onclick="openDictionary()">📖 どうぐ ＆ なかま ずかん</button>
    <div id="med-list-container"></div>
    
    <div style="margin-top: 50px; border-top: 2px dashed #ccc; padding-top: 20px;">
      <button onclick="renderNfcSetup()" style="background:none; border:none; color:#7f8c8d; text-decoration:underline; font-size: 1rem; cursor: pointer;">⚙️ NFCタグ設定（親御さん用）</button>
    </div>
  </div>

  <div id="dictionary-view" class="view">
    <h2>📖 ずかん ＆ ステータス</h2>
    
    <div class="rpg-status">
      <p class="rpg-level">Lv.<span id="dict-level">1</span></p>
      <p class="rpg-title" id="dict-title">みならい ゆうしゃ</p>
      
      <p id="dict-exp" style="margin:10px 0 5px 0; font-size:1.1rem; color:#fff;"></p>
      <div style="background:rgba(255,255,255,0.3); border-radius:5px; height:10px; width:80%; margin: 0 auto; overflow:hidden;">
        <div id="dict-exp-bar-fill" style="background:#f1c40f; height:100%; width:0%; transition: width 0.5s;"></div>
      </div>
      <p id="dict-exp-tonext" style="margin:5px 0 0 0; font-size:0.9rem; color:#fff;"></p>
    </div>

    <p id="dict-progress" style="font-size: 1.3rem; font-weight: bold; color: #8e44ad;"></p>
    <div id="dict-container" class="dict-grid"></div>
    <br><br>
    <button class="btn" style="background-color: #95a5a6; box-shadow:0 6px 0 #7f8c8d;" onclick="switchView('task-view')">もどる</button>
  </div>

  <div id="nfc-setup-view" class="view">
    <h2>⚙️ NFCタグ URL発行</h2>
    <div id="nfc-url-container"></div>
    <br><button class="btn" style="background-color: #95a5a6; box-shadow:0 6px 0 #7f8c8d;" onclick="switchView('task-view')">もどる</button>
  </div>

  <div id="camera-view" class="view">
    <h2 id="target-med-title">お薬の名前</h2>
    <p>のんだら、からっぽの ふくろ・シートを<br><strong>しゃしん</strong> にとって教えてね！📸</p>
    <label class="btn btn-camera">
      📸 しゃしんをとる！
      <input type="file" accept="image/*" capture="environment" id="camera-input" style="display: none;">
    </label>
    <br><br><button onclick="switchView('task-view')" style="background:none; border:none; color:#7f8c8d; text-decoration:underline; font-size: 1rem; cursor: pointer;">もどる</button>
  </div>

  <div id="sending-view" class="view">
    <h2>はなまる を つけています... 💮</h2>
    <div class="spinner"></div>
  </div>

  <div id="complete-view" class="view">
    <h1 style="font-size: 3rem; margin-top: 20px;">🎉</h1>
    <div id="new-badge-container"></div>
    <div id="gacha-rarity" class="rarity-label"></div>
    <div id="child-message-box" class="child-comment"></div>
    <button class="btn" style="background-color: #2ecc71; box-shadow:0 6px 0 #27ae60;" onclick="location.reload()">ぼうけんをつづける</button>
  </div>

  <div id="error-view" class="view">
    <h2>うーん、つながらなかったよ 😢</h2>
    <p>電波のよいところで、もういちど試してみてね。</p>
    <div id="error-details" style="color:#c0392b; font-size:0.9rem; margin:20px auto; font-weight:bold; background:#fadbd8; padding:10px; border-radius:10px; max-width:400px; display:none;"></div>
    <button class="btn" style="background-color: #e74c3c; box-shadow:0 6px 0 #c0392b;" onclick="location.reload()">やりなおす</button>
  </div>


  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwy1VKCy0ud87bkvtomzsNkLrwJWE8LUI10IssxVPGr2GIgKaB1Xn1m8YDcLngC5xYywA/exec";

    let state = { currentSelectedMedId: null, medList: [] };

    // レアリティごとの経験値（EXP）設定
    const rarityExp = { "N": 10, "R": 50, "SR": 200, "UR": 1000 };
    const rpgConstant = 0.683; // 300種類コンプでLv100に達する係数

    // 12秒のタイムアウト安全診断装置
    setTimeout(() => {
      const loadingView = document.getElementById('loading-view');
      if (loadingView && loadingView.classList.contains('active-view')) {
        showError("通信タイムアウト。GASのURLかデプロイ設定を今一度ご確認ください。");
      }
    }, 12000);

    function showError(message) {
      const details = document.getElementById('error-details');
      if (details) { details.innerText = "【親御さん向けエラー】: " + message; details.style.display = "block"; }
      switchView('error-view');
    }

    function drawGacha() {
      const rand = Math.random() * 100;
      let targetRarity = "N";
      if (rand < 3) targetRarity = "UR";
      else if (rand < 15) targetRarity = "SR";
      else if (rand < 40) targetRarity = "R";
      else targetRarity = "N";
      
      const pool = gachaMessages.filter(m => m.rarity === targetRarity);
      if (pool.length === 0) return {id:0, rarity:"N", text:"ずかんデータ（list.js）を読み込み中！"};
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function switchView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
      const target = document.getElementById(viewId);
      if(target) target.classList.add('active-view');
    }

    function getCollectedIds() { 
      try { return JSON.parse(localStorage.getItem('gacha_collection') || '[]'); } catch(e) { return []; }
    }

    function saveToCollection(id) {
      const collected = getCollectedIds();
      if (!collected.includes(id)) {
        collected.push(id);
        localStorage.setItem('gacha_collection', JSON.stringify(collected));
        return true; 
      }
      return false; 
    }

    function calculateTotalExp(collectedIds) {
      let totalExp = 0;
      collectedIds.forEach(id => {
        const card = gachaMessages.find(m => m.id === id);
        if (card) totalExp += rarityExp[card.rarity];
      });
      return totalExp;
    }

    function calculateExpFromLevel(level) {
      if (level <= 1) return 0;
      return Math.pow((level - 1) / rpgConstant, 2);
    }

    function getRpgStatus() {
      const collectedIds = getCollectedIds();
      const totalExp = calculateTotalExp(collectedIds);
      
      let level = Math.floor(1 + rpgConstant * Math.sqrt(totalExp));
      if (level < 1) level = 1;
      
      const titles = [
        { minLevel: 100, title: "🌈 うちゅうの きゅうせいしゅ" },
        { minLevel: 80, title: "👑 でんせつの ゆうしゃ" },
        { minLevel: 50, title: "⚔️ えいゆう" },
        { minLevel: 30, title: "🛡️ たつじん ぼうけんしゃ" },
        { minLevel: 15, title: "🎒 いっぱしの ぼうけんしゃ" },
        { minLevel: 5,  title: "🗡️ かけだしの ゆうしゃ" },
        { minLevel: 1,  title: "🌱 みならい ゆうしゃ" }
      ];
      const statusTitle = titles.find(t => level >= t.minLevel).title;
      
      const currentLevelExpMinTotal = calculateExpFromLevel(level);
      const nextLevelExpTotal = calculateExpFromLevel(level + 1);
      const expInLevel = totalExp - currentLevelExpMinTotal;
      const expToNextLevel = nextLevelExpTotal - currentLevelExpMinTotal;
      
      return { level, title: statusTitle, totalExp, cardCount: collectedIds.length, expInLevel, expToNextLevel };
    }

    function updateRpgDisplay() {
      const status = getRpgStatus();
      ['top-level', 'dict-level'].forEach(id => { const el = document.getElementById(id); if(el) el.innerText = status.level; });
      ['top-title', 'dict-title'].forEach(id => { const el = document.getElementById(id); if(el) el.innerText = status.title; });
      
      const dictExp = document.getElementById('dict-exp');
      if(dictExp) dictExp.innerHTML = `<strong>EXP: ${Math.floor(status.totalExp)}</strong>`;
      
      const dictExpBar = document.getElementById('dict-exp-bar-fill');
      if(dictExpBar) {
        const percentage = status.expToNextLevel > 0 ? (status.expInLevel / status.expToNextLevel) * 100 : 100;
        dictExpBar.style.width = `${Math.min(percentage, 100)}%`;
      }
      const dictExpToNext = document.getElementById('dict-exp-tonext');
      if(dictExpToNext) dictExpToNext.innerHTML = `つぎの レベルまで： あと ${Math.floor(status.expToNextLevel - status.expInLevel)} EXP`;
    }

    function openDictionary() {
      updateRpgDisplay();
      const container = document.getElementById('dict-container');
      container.innerHTML = '';
      const collected = getCollectedIds();
      
      document.getElementById('dict-progress').innerText = `あつめた カード： ${collected.length} / ${gachaMessages.length} まい`;

      const sortedMessages = [...gachaMessages].sort((a, b) => {
        const order = { "UR": 1, "SR": 2, "R": 3, "N": 4 };
        return order[a.rarity] - order[b.rarity] || a.id - b.id;
      });

      sortedMessages.forEach(med => {
        const isUnlocked = collected.includes(med.id);
        const itemDiv = document.createElement('div');
        if (isUnlocked) {
          itemDiv.className = `dict-item dict-unlocked-${med.rarity}`;
          itemDiv.innerHTML = `<span class="rarity-tag tag-${med.rarity}">${med.rarity}</span> ${med.text}`;
        } else {
          itemDiv.className = `dict-item dict-locked`;
          itemDiv.innerHTML = `<span class="rarity-tag" style="background:#bdc3c7;">???</span> ？？？？？？？？`;
        }
        container.appendChild(itemDiv);
      });
      switchView('dictionary-view');
    }

    window.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has('reset')) {
        localStorage.clear(); 
        alert("✅ アプリの履歴（飲んだ回数・図鑑・経験値）をすべてリセットしました！");
        window.location.href = window.location.origin + window.location.pathname;
        return;
      }
      updateRpgDisplay();
      if (urlParams.has('id')) state.currentSelectedMedId = urlParams.get('id');
      await loadMedicationList();
    });

    async function loadMedicationList() {
      try {
        const fetchUrl = `${GAS_URL}?action=getList&t=${Date.now()}`;
        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('通信タイムアウト')), 8000));
        const fetchPromise = fetch(fetchUrl, { method: 'GET', mode: 'cors' }).then(res => res.json());

        const response = await Promise.race([fetchPromise, timeoutPromise]);
        if (response && response.status === 'success') {
          state.medList = response.data;
          renderList();
          
          if (state.currentSelectedMedId) {
            const selectedMed = state.medList.find(m => String(m.id) === String(state.currentSelectedMedId));
            if (selectedMed) {
              const todayStr = new Date().toISOString().slice(0, 10);
              const currentCount = parseInt(localStorage.getItem(`count_${selectedMed.id}_${todayStr}`) || "0", 10);
              const limitCount = parseInt(selectedMed.limitCount || "0", 10);
              if (limitCount > 0 && currentCount >= limitCount) {
                alert("きょうの ぶん は もうおしまいだよ！✨\nステータスを かくにんしよう！");
                state.currentSelectedMedId = null; 
              } else {
                openCameraView(selectedMed.id, selectedMed.title);
                return;
              }
            }
          }
          switchView('task-view');
        } else {
          showError("データ構造エラー");
        }
      } catch (error) {
        showError(error.message);
      }
    }

    function renderList() {
      const container = document.getElementById('med-list-container');
      container.innerHTML = '';
      state.medList.forEach(med => {
        const todayStr = new Date().toISOString().slice(0, 10);
        const currentCount = parseInt(localStorage.getItem(`count_${med.id}_${todayStr}`) || "0", 10);
        const limitCount = parseInt(med.limitCount || "0", 10);
        
        const card = document.createElement('div');
        card.className = 'med-card';
        if (limitCount > 0 && currentCount >= limitCount) {
          card.innerHTML = `<h3>✅ ${med.title}</h3><p style="color: #2ecc71; font-weight: bold;">きょうは もう おわったよ！🌟</p>`;
        } else {
          let countBadge = limitCount > 0 ? `<span style="font-size:0.8rem; background:#3498db; color:white; padding:2px 6px; border-radius:5px;">あと ${limitCount - currentCount}回</span>` : '';
          card.innerHTML = `
            <h3>💊 ${med.title} ${countBadge}</h3>
            <p style="font-size: 0.9rem; color: #7f8c8d;">(${med.time} の おくすり)</p>
            <button class="btn btn-camera" style="padding:10px 20px; font-size:1.1rem; width:auto;" onclick="openCameraView('${med.id}', '${med.title}')">のんだよ！📸</button>
          `;
        }
        container.appendChild(card);
      });
    }

    function renderNfcSetup() {
      const container = document.getElementById('nfc-url-container');
      container.innerHTML = '';
      const baseUrl = window.location.origin + window.location.pathname;
      state.medList.forEach(med => {
        const card = document.createElement('div');
        card.className = 'med-card';
        card.innerHTML = `
          <h3 style="margin-top: 0;">💊 ${med.title}</h3>
          <input type="text" class="url-input" value="${baseUrl}?id=${med.id}" readonly id="nfc-url-${med.id}">
          <br><button class="btn btn-copy" onclick="copyToClipboard('${med.id}')">URLをコピー</button>
        `;
        container.appendChild(card);
      });
      switchView('nfc-setup-view');
    }

    function copyToClipboard(medId) {
      const copyText = document.getElementById(`nfc-url-${medId}`);
      copyText.select();
      copyText.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(copyText.value).then(() => alert("コピーしました！"));
    }

    function openCameraView(medId, medTitle) {
      state.currentSelectedMedId = medId;
      document.getElementById('target-med-title').innerText = medTitle;
      switchView('camera-view');
    }

    function resizeAndConvertGachaImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            let width = img.width; let height = img.height;
            const max = 800; 
            if (width > height) { if (width > max) { height *= max / width; width = max; } } 
            else { if (height > max) { width *= max / height; height = max; } }
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.5).split(',')[1]); 
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    document.getElementById('camera-input').addEventListener('change', async function(e) {
      const file = e.target.files[0];
      if (!file) return;

      switchView('sending-view');
      const base64Image = await resizeAndConvertGachaImage(file);
      const payload = { action: 'log', id: state.currentSelectedMedId, name: 'ユーザー', image: base64Image };

      const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 10000));
      const fetchPromise = fetch(GAS_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });

      try {
        await Promise.race([fetchPromise, timeoutPromise]);

        const todayStr = new Date().toISOString().slice(0, 10);
        const currentCount = parseInt(localStorage.getItem(`count_${state.currentSelectedMedId}_${todayStr}`) || "0", 10);
        localStorage.setItem(`count_${state.currentSelectedMedId}_${todayStr}`, (currentCount + 1).toString());

        const gachaResult = drawGacha();
        const isNew = saveToCollection(gachaResult.id);
        const earnedExp = rarityExp[gachaResult.rarity]; 

        const rarityBox = document.getElementById('gacha-rarity');
        const messageBox = document.getElementById('child-message-box');
        const badgeContainer = document.getElementById('new-badge-container');
        
        if (isNew) {
          badgeContainer.innerHTML = `<div class="new-badge">✨ NEW! ${earnedExp} EXP ゲット！ ✨</div>`;
        } else {
          badgeContainer.innerHTML = '';
        }

        if (gachaResult.rarity === 'UR') {
          rarityBox.innerHTML = '<span style="color:#ff4500;">ウルトラレア！！ 【 UR 】</span>';
          messageBox.style.backgroundColor = '#ffd700'; messageBox.style.color = '#d35400'; messageBox.style.border = '4px solid #ff4500';
        } else if (gachaResult.rarity === 'SR') {
          rarityBox.innerHTML = '<span style="color:#e67e22;">スーパーレア！ 【 SR 】</span>';
          messageBox.style.backgroundColor = '#f8c471'; messageBox.style.color = '#c0392b'; messageBox.style.border = '2px solid #e67e22';
        } else if (gachaResult.rarity === 'R') {
          rarityBox.innerHTML = '<span style="color:#1abc9c;">レア 【 R 】</span>';
          messageBox.style.backgroundColor = '#e8f8f5'; messageBox.style.color = '#16a085'; messageBox.style.border = '2px solid #1abc9c';
        } else {
          rarityBox.innerHTML = '<span style="color:#e67e22; font-size:1.5rem;">ノーマル 【 N 】</span>';
          messageBox.style.backgroundColor = '#fff3e0'; messageBox.style.color = '#d35400'; messageBox.style.border = '2px solid #e67e22';
        }
        
        messageBox.innerHTML = `
          <strong>${gachaResult.text}</strong>
          <p style="margin:10px 0 0 0; font-size:1.1rem; color:#2c3e50;">＋ ${earnedExp} EXP ゲット！</p>
        `;

        switchView('complete-view');
        if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
        updateRpgDisplay();

      } catch (error) {
        showError("送信失敗: " + error.message);
      } finally {
        e.target.value = '';
      }
    });
  </script>
</body>
</html>
