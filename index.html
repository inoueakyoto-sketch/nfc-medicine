    .active-view { display: block; }
    h1, h2 { color: #2c3e50; margin-top: 20px; }
    p { font-size: 1.1rem; line-height: 1.5; color: #555; }

    .btn {
      display: inline-block; margin: 15px auto;
      padding: 15px 30px; font-size: 1.3rem; font-weight: bold;
      color: white; border-radius: 20px; cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,0.15); transition: all 0.1s;
      border: none; max-width: 90%; width: 320px;
    }
    .btn-camera { background-color: #ff9800; box-shadow: 0 6px 0 #e65100; }
    .btn-camera:active { transform: translateY(4px); box-shadow: 0 2px 0 #e65100; }
    .btn-dictionary { background-color: #8e44ad; box-shadow: 0 6px 0 #732d91; margin-bottom: 20px;}
    .btn-dictionary:active { transform: translateY(4px); box-shadow: none; }
    .btn-copy { background-color: #3498db; padding: 10px 20px; font-size: 1rem; border-radius: 10px; box-shadow: 0 4px 0 #2980b9; margin-top: 10px;}
    
    .spinner {
      border: 6px solid #f3f3f3; border-top: 6px solid #3498db;
      border-radius: 50%; width: 50px; height: 50px;
      animation: spin 1s linear infinite; margin: 30px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .med-card {
      background: white; border-radius: 15px; padding: 20px;
      margin: 15px auto; max-width: 400px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .url-input { width: 100%; padding: 10px; font-size: 0.9rem; background-color: #f1f2f6; border: 1px solid #dcdde1; border-radius: 5px; color: #7f8c8d; }

    /* RPGシステム用のスタイル */
    .rpg-status {
      background: linear-gradient(135deg, #2c3e50, #34495e);
      color: white; padding: 15px; border-radius: 15px; margin: 10px auto 30px auto;
      max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 2px solid #f1c40f;
    }
    .rpg-level { font-size: 1.8rem; font-weight: 900; color: #f1c40f; margin: 0; text-shadow: 1px 1px 2px black;}
    .rpg-title { font-size: 1.2rem; margin: 5px 0 0 0; font-weight: bold; }
    
    .rarity-label { font-size: 2rem; font-weight: 900; margin: 10px 0; text-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
    .child-comment { font-size: 1.4rem; font-weight: bold; margin: 10px auto 20px auto; padding: 20px; border-radius: 15px; max-width: 400px;}
    
    .new-badge {
      display: inline-block; background-color: #e74c3c; color: white;
      font-size: 1.2rem; font-weight: bold; padding: 8px 15px; border-radius: 20px;
      animation: bounce 1s infinite; margin-bottom: 10px; border: 2px solid white;
    }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    .rarity-tag { display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: 0.9rem; margin-right: 10px; color: white; }
    .tag-N { background-color: #e67e22; } .tag-R { background-color: #1abc9c; } .tag-SR { background-color: #e67e22; } .tag-UR { background-color: #ff4500; }

  // ================= ここから下のプログラムをすべて上書き =================

    // 【安全装置】もし12秒以上ぐるぐるが続いたら、強制的にエラー画面を出して原因を表示する
    setTimeout(() => {
      const loadingView = document.getElementById('loading-view');
      if (loadingView && loadingView.classList.contains('active-view')) {
        showError("通信がタイムアウトしました。電波が悪いか、GASのURLが間違っている可能性があります。");
      }
    }, 12000);

    function showError(message) {
      document.getElementById('error-view').innerHTML = `
        <h2>うーん、つながらなかったよ 😢</h2>
        <p>電波のよいところで、もういちど試してみてね。</p>
        <p style="color:#c0392b; font-size:0.9rem; margin-top:20px; font-weight:bold; background:#fadbd8; padding:10px; border-radius:10px;">
          【親御さん向け・エラー原因】<br>${message}
        </p>
        <button class="btn" style="background-color: #e74c3c; box-shadow:0 6px 0 #c0392b;" onclick="location.reload()">やりなおす</button>
      `;
      switchView('error-view');
    }

    function drawGacha() {
      const rand = Math.random() * 100;
      let targetRarity = "N";
      if (rand < 3) targetRarity = "UR";
      else if (rand < 15) targetRarity = "SR";
      else if (rand < 40) targetRarity = "R";
      else targetRarity = "N";
      
      const pool = gachaMessages.filter(m => m.rarity === targetRarity);
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function switchView(viewId) {
      try {
        const views = document.querySelectorAll('.view');
        for (let i = 0; i < views.length; i++) {
          views[i].classList.remove('active-view');
        }
        const target = document.getElementById(viewId);
        if (target) target.classList.add('active-view');
      } catch(e) {
        console.error("画面切り替えエラー:", e);
      }
    }

    // ================= RPGレベル＆コレクション処理 =================
    function getCollectedIds() {
      try {
        return JSON.parse(localStorage.getItem('gacha_collection') || '[]');
      } catch(e) {
        return []; // データが壊れていた場合は空に戻す
      }
    }

    function saveToCollection(id) {
      const collected = getCollectedIds();
      if (!collected.includes(id)) {
        collected.push(id);
        localStorage.setItem('gacha_collection', JSON.stringify(collected));
        return true; 
      }
      return false; 
    }

    function getRpgStatus() {
      const level = getCollectedIds().length + 1;
      let title = "むらびと";
      if (level >= 100) title = "🌈 うちゅうの きゅうせいしゅ";
      else if (level >= 80) title = "👑 でんせつの ゆうしゃ";
      else if (level >= 50) title = "⚔️ えいゆう";
      else if (level >= 30) title = "🛡️ たつじん ぼうけんしゃ";
      else if (level >= 15) title = "🎒 いっぱしの ぼうけんしゃ";
      else if (level >= 5) title = "🗡️ かけだしの ゆうしゃ";
      else title = "🌱 みならい ゆうしゃ";
      
      return { level, title };
    }

    function updateRpgDisplay() {
      const status = getRpgStatus();
      const topLevel = document.getElementById('top-level');
      if(topLevel) topLevel.innerText = status.level;
      const topTitle = document.getElementById('top-title');
      if(topTitle) topTitle.innerText = status.title;
      const dictLevel = document.getElementById('dict-level');
      if(dictLevel) dictLevel.innerText = status.level;
      const dictTitle = document.getElementById('dict-title');
      if(dictTitle) dictTitle.innerText = status.title;
    }

    function openDictionary() {
      updateRpgDisplay();
      const container = document.getElementById('dict-container');
      container.innerHTML = '';
      const collected = getCollectedIds();
      
      document.getElementById('dict-progress').innerText = `あつめた カード： ${collected.length} / ${gachaMessages.length} まい`;

      const sortedMessages = [...gachaMessages].sort((a, b) => {
        const order = { "UR": 1, "SR": 2, "R": 3, "N": 4 };
        return order[a.rarity] - order[b.rarity] || a.id - b.id;
      });

      sortedMessages.forEach(med => {
        const isUnlocked = collected.includes(med.id);
        const itemDiv = document.createElement('div');
        
        if (isUnlocked) {
          itemDiv.className = `dict-item dict-unlocked-${med.rarity}`;
          itemDiv.innerHTML = `<span class="rarity-tag tag-${med.rarity}">${med.rarity}</span> ${med.text}`;
        } else {
          itemDiv.className = `dict-item dict-locked`;
          itemDiv.innerHTML = `<span class="rarity-tag" style="background:#bdc3c7;">???</span> ？？？？？？？？`;
        }
        container.appendChild(itemDiv);
      });
      switchView('dictionary-view');
    }

    window.addEventListener('DOMContentLoaded', async () => {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('reset')) {
          localStorage.clear(); 
          alert("✅ アプリの履歴（飲んだ回数・図鑑レベル）をすべてリセットしました！");
          window.location.href = window.location.origin + window.location.pathname;
          return;
        }
        
        updateRpgDisplay();
        
        if (urlParams.has('id')) {
          state.currentSelectedMedId = urlParams.get('id');
        }
        await loadMedicationList();
      } catch (e) {
        showError("起動中にエラーが発生しました: " + e.message);
      }
    });

    async function loadMedicationList() {
      try {
        const fetchUrl = `${GAS_URL}?action=getList&t=${Date.now()}`;
        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('タイムアウト（通信が遅すぎます）')), 8000));
        
        const fetchPromise = fetch(fetchUrl, { method: 'GET', mode: 'cors' }).then(res => {
          if (!res.ok) throw new Error(`サーバーエラー (ステータス: ${res.status})`);
          return res.json();
        });

        const response = await Promise.race([fetchPromise, timeoutPromise]);
        
        if (response && response.status === 'success') {
          state.medList = response.data;
          renderList();
          
          if (state.currentSelectedMedId) {
            const selectedMed = state.medList.find(m => String(m.id) === String(state.currentSelectedMedId));
            if (selectedMed) {
              const todayStr = new Date().toISOString().slice(0, 10);
              const currentCount = parseInt(localStorage.getItem(`count_${selectedMed.id}_${todayStr}`) || "0", 10);
              const limitCount = parseInt(selectedMed.limitCount || "0", 10);
              if (limitCount > 0 && currentCount >= limitCount) {
                alert("きょうの ぶん は もうおしまいだよ！✨\nステータスを かくにんしよう！");
                state.currentSelectedMedId = null; 
              } else {
                openCameraView(selectedMed.id, selectedMed.title);
                return;
              }
            }
          }
          switchView('task-view');
        } else {
          throw new Error(response ? response.message : "データが取得できませんでした");
        }
      } catch (error) {
        showError("通信エラー: " + error.message);
      }
    }

    function renderList() {
      const container = document.getElementById('med-list-container');
      container.innerHTML = '';
      state.medList.forEach(med => {
        const todayStr = new Date().toISOString().slice(0, 10);
        const currentCount = parseInt(localStorage.getItem(`count_${med.id}_${todayStr}`) || "0", 10);
        const limitCount = parseInt(med.limitCount || "0", 10);
        
        const card = document.createElement('div');
        card.className = 'med-card';
        if (limitCount > 0 && currentCount >= limitCount) {
          card.innerHTML = `
            <h3>✅ ${med.title}</h3>
            <p style="color: #2ecc71; font-weight: bold;">きょうは もう おわったよ！🌟</p>
          `;
        } else {
          let countBadge = limitCount > 0 ? `<span style="font-size:0.8rem; background:#3498db; color:white; padding:2px 6px; border-radius:5px;">あと ${limitCount - currentCount}回</span>` : '';
          card.innerHTML = `
            <h3>💊 ${med.title} ${countBadge}</h3>
            <p style="font-size: 0.9rem; color: #7f8c8d;">(${med.time} の おくすり)</p>
            <button class="btn btn-camera" style="padding:10px 20px; font-size:1.1rem; width:auto;" 
              onclick="openCameraView('${med.id}', '${med.title}')">のんだよ！📸</button>
          `;
        }
        container.appendChild(card);
      });
    }

    function renderNfcSetup() {
      const container = document.getElementById('nfc-url-container');
      container.innerHTML = '';
      const baseUrl = window.location.origin + window.location.pathname;
      state.medList.forEach(med => {
        const card = document.createElement('div');
        card.className = 'med-card';
        card.innerHTML = `
          <h3 style="margin-top: 0;">💊 ${med.title}</h3>
          <input type="text" class="url-input" value="${baseUrl}?id=${med.id}" readonly id="nfc-url-${med.id}">
          <br><button class="btn btn-copy" onclick="copyToClipboard('${med.id}')">URLをコピー</button>
        `;
        container.appendChild(card);
      });
      switchView('nfc-setup-view');
    }

    function copyToClipboard(medId) {
      const copyText = document.getElementById(`nfc-url-${medId}`);
      copyText.select();
      copyText.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(copyText.value).then(() => alert("コピーしました！")).catch(() => alert("手動でコピーしてください"));
    }

    function openCameraView(medId, medTitle) {
      state.currentSelectedMedId = medId;
      document.getElementById('target-med-title').innerText = medTitle;
      switchView('camera-view');
    }

    function resizeAndConvertGachaImage(file) {
      return new Promise((resolve, reject) => {
        try {
          const reader = new FileReader();
          reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
              const canvas = document.createElement('canvas');
              let width = img.width; let height = img.height;
              const max = 800; 
              if (width > height) { if (width > max) { height *= max / width; width = max; } } 
              else { if (height > max) { width *= max / height; height = max; } }
              canvas.width = width; canvas.height = height;
              canvas.getContext('2d').drawImage(img, 0, 0, width, height);
              resolve(canvas.toDataURL('image/jpeg', 0.5).split(',')[1]); 
            };
            img.onerror = () => reject(new Error("画像の読み込みに失敗しました"));
            img.src = e.target.result;
          };
          reader.onerror = () => reject(new Error("ファイルの読み込みに失敗しました"));
          reader.readAsDataURL(file);
        } catch(e) {
          reject(e);
        }
      });
    }

    document.getElementById('camera-input').addEventListener('change', async function(e) {
      try {
        const file = e.target.files[0];
        if (!file) return;

        switchView('sending-view');
        const base64Image = await resizeAndConvertGachaImage(file);
        const payload = { action: 'log', id: state.currentSelectedMedId, name: 'ユーザー', image: base64Image };

        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('送信タイムアウト（通信が遅すぎます）')), 10000));
        const fetchPromise = fetch(GAS_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });

        await Promise.race([fetchPromise, timeoutPromise]);

        const todayStr = new Date().toISOString().slice(0, 10);
        const currentCount = parseInt(localStorage.getItem(`count_${state.currentSelectedMedId}_${todayStr}`) || "0", 10);
        localStorage.setItem(`count_${state.currentSelectedMedId}_${todayStr}`, (currentCount + 1).toString());

        const gachaResult = drawGacha();
        const isNew = saveToCollection(gachaResult.id);
        
        const rarityBox = document.getElementById('gacha-rarity');
        const messageBox = document.getElementById('child-message-box');
        const badgeContainer = document.getElementById('new-badge-container');
        
        if (isNew) {
          badgeContainer.innerHTML = `<div class="new-badge">✨ NEW! レベルがあがった！ ✨</div>`;
        } else {
          badgeContainer.innerHTML = '';
        }

        if (gachaResult.rarity === 'UR') {
          rarityBox.innerHTML = '<span style="color:#ff4500;">ウルトラレア！！ 【 UR 】</span>';
          messageBox.style.backgroundColor = '#ffd700'; messageBox.style.color = '#d35400'; messageBox.style.border = '4px solid #ff4500';
        } else if (gachaResult.rarity === 'SR') {
          rarityBox.innerHTML = '<span style="color:#e67e22;">スーパーレア！ 【 SR 】</span>';
          messageBox.style.backgroundColor = '#f8c471'; messageBox.style.color = '#c0392b'; messageBox.style.border = '2px solid #e67e22';
        } else if (gachaResult.rarity === 'R') {
          rarityBox.innerHTML = '<span style="color:#1abc9c;">レア 【 R 】</span>';
          messageBox.style.backgroundColor = '#e8f8f5'; messageBox.style.color = '#16a085'; messageBox.style.border = '2px solid #1abc9c';
        } else {
          rarityBox.innerHTML = '<span style="color:#e67e22; font-size:1.5rem;">ノーマル 【 N 】</span>';
          messageBox.style.backgroundColor = '#fff3e0'; messageBox.style.color = '#d35400'; messageBox.style.border = '2px solid #e67e22';
        }
        
        messageBox.innerHTML = `<strong>${gachaResult.text}</strong>`;

        switchView('complete-view');
        
        if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });

      } catch (error) {
        showError("送信エラー: " + error.message);
      } finally {
        e.target.value = '';
      }
    });
  </script>
