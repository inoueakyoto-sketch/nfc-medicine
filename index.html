<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おくすりチェック！💊</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #f7f9fc; color: #333;
      text-align: center;
    }
    .view { display: none; padding: 20px; min-height: 100vh; }
    .active-view { display: block; }
    h1, h2 { color: #2c3e50; margin-top: 30px; }
    p { font-size: 1.1rem; line-height: 1.5; color: #555; }

    .btn {
      display: inline-block; margin: 20px auto;
      padding: 20px 40px; font-size: 1.3rem; font-weight: bold;
      color: white; border-radius: 20px; cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,0.15); transition: all 0.1s;
      border: none; max-width: 90%; width: 320px;
    }
    .btn-camera { background-color: #ff9800; box-shadow: 0 6px 0 #e65100; }
    .btn-camera:active { transform: translateY(4px); box-shadow: 0 2px 0 #e65100; }
    
    .spinner {
      border: 6px solid #f3f3f3; border-top: 6px solid #3498db;
      border-radius: 50%; width: 50px; height: 50px;
      animation: spin 1s linear infinite; margin: 30px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .med-card {
      background: white; border-radius: 15px; padding: 20px;
      margin: 15px auto; max-width: 400px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    /* お子様向けコメント用のスタイル */
    .child-comment {
      font-size: 1.4rem; color: #e67e22; font-weight: bold;
      margin: 20px 0; background-color: #fff3e0;
      padding: 15px; border-radius: 10px;
    }
  </style>
</head>
<body>

  <div id="loading-view" class="view active-view">
    <h2>じゅんび中... ⏳</h2>
    <div class="spinner"></div>
  </div>

  <div id="task-view" class="view">
    <h1>おくすり のんだかな？ 💊</h1>
    <p id="user-welcome">こんにちは！今日もがんばろうね！</p>
    <div id="med-list-container"></div>
  </div>

  <div id="camera-view" class="view">
    <h2 id="target-med-title">お薬の名前</h2>
    <p>のんだら、からっぽの ふくろ・シートを<br><strong>しゃしん</strong> にとって教えてね！📸</p>
    
    <label class="btn btn-camera">
      📸 しゃしんをとる！
      <input type="file" accept="image/*" capture="environment" id="camera-input" style="display: none;">
    </label>
    <br><br>
    <button onclick="switchView('task-view')" style="background:none; border:none; color:#7f8c8d; text-decoration:underline; font-size: 1rem;">もどる</button>
  </div>

  <div id="sending-view" class="view">
    <h2>はなまる を つけています... 💮</h2>
    <p>画面を閉じずに、すこし待ってね</p>
    <div class="spinner"></div>
  </div>

  <div id="complete-view" class="view">
    <h1 style="font-size: 3rem; margin-top: 50px;">🎉</h1>
    <h2>すごーい！！<br>よくできました！🌟</h2>
    
    <div id="child-message-box" class="child-comment"></div>

    <button class="btn" style="background-color: #2ecc71; box-shadow:0 6px 0 #27ae60;" onclick="location.reload()">最初にもどる</button>
  </div>

  <div id="error-view" class="view">
    <h2>うーん、つながらなかったよ 😢</h2>
    <p>電波のよいところで、もういちど試してみてね。</p>
    <button class="btn" style="background-color: #e74c3c; box-shadow:0 6px 0 #c0392b;" onclick="location.reload()">やりなおす</button>
  </div>


  <script>
    // GASのURL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwy1VKCy0ud87bkvtomzsNkLrwJWE8LUI10IssxVPGr2GIgKaB1Xn1m8YDcLngC5xYywA/exec";

    // 状態管理
    let state = {
      currentSelectedMedId: null,
      medList: []
    };

    // ================= ガチャ機能・メッセージデータ =================
    const gachaMessages = [
      // N (ノーマル: 60%)
      { rarity: "N", text: "きょうも げんきに すごそうね！☀️" },
      { rarity: "N", text: "お薬のめたね！えらい！💮" },
      { rarity: "N", text: "ニコニコな 1日に なりますように！😊" },
      { rarity: "N", text: "バッチリだよ！そのちょうし！👍" },
      { rarity: "N", text: "しゃしん、上手にとれたね！📸" },
      { rarity: "N", text: "きょうも はなまる だよ！💮" },
      { rarity: "N", text: "ごはんも モリモリ たべようね！🍚" },
      { rarity: "N", text: "おてつだい も ひとつ できるかな？✨" },
      { rarity: "N", text: "きょうは どんな たのしいことがあるかな？🎈" },
      { rarity: "N", text: "ぐっすり ねむれる おまじない！🌟" },
      
      // R (レア: 25%)
      { rarity: "R", text: "キラキラパワー ゲット！✨ いいことあるよ！" },
      { rarity: "R", text: "すごいぞ！ヒーローみたいにかっこいい！🦸‍♂️" },
      { rarity: "R", text: "やったー！きみの レベルが あがった！🍄" },
      { rarity: "R", text: "グッドジョブ！きょうは さいこうの 1日だ！🚀" },
      { rarity: "R", text: "ラッキーデー！おやつが いつもより おいしいかも？🍩" },
      { rarity: "R", text: "たいへん よくできました！王冠をプレゼント！👑" },
      { rarity: "R", text: "魔法のパワーが たまったよ！🪄✨" },
      { rarity: "R", text: "パーフェクト！きみの えがお が 1番だね！😆" },

      // SR (スーパーレア: 12%)
      { rarity: "SR", text: "【SR】でんせつの けん を てにいれた！⚔️ きょうは むてきだ！" },
      { rarity: "SR", text: "【SR】ミラクルパワー ぜんかい！🔥 なんにでも ちょうせんできるぞ！" },
      { rarity: "SR", text: "【SR】スーパー・ラッキー！🌟 きょうは ほしに ねがいごとをしよう！" },
      { rarity: "SR", text: "【SR】だいはっけん！💎 きみは てんさい かもしれない！" },
      { rarity: "SR", text: "【SR】きょうの きみは ロケットみたいに とべそうだ！🚀💨" },

      // UR (ウルトラレア: 3%)
      { rarity: "UR", text: "🌈【超激レア】🌈 うちゅういち の がんばりやさん！ 👑✨" },
      { rarity: "UR", text: "🌈【超激レア】🌈 まぼろしの ドラゴン が なかまになった！ 🐉🔥" },
      { rarity: "UR", text: "🌈【超激レア】🌈 きみは でんせつの ゆうしゃ だ！ さあ、ぼうけんに しゅっぱつだ！ ⚔️🛡️" }
    ];

    function drawGacha() {
      const rand = Math.random() * 100;
      let targetRarity = "N";
      
      if (rand < 3) {
        targetRarity = "UR";
      } else if (rand < 15) {
        targetRarity = "SR";
      } else if (rand < 40) {
        targetRarity = "R";
      } else {
        targetRarity = "N";
      }
      
      const filteredMessages = gachaMessages.filter(m => m.rarity === targetRarity);
      return filteredMessages[Math.floor(Math.random() * filteredMessages.length)];
    }
    // =========================================================

    // 画面切り替え
    function switchView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
      const target = document.getElementById(viewId);
      if(target) target.classList.add('active-view');
    }

    // 初期起動
    window.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has('id')) {
        state.currentSelectedMedId = urlParams.get('id');
      }
      await loadMedicationList();
    });

    // スプレッドシートからデータ取得
    async function loadMedicationList() {
      const fetchUrl = `${GAS_URL}?action=getList&t=${Date.now()}`;
      const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 8000));
      const fetchPromise = fetch(fetchUrl, { method: 'GET', mode: 'cors' }).then(res => res.json());

      try {
        const response = await Promise.race([fetchPromise, timeoutPromise]);
        if (response.status === 'success') {
          state.medList = response.data;
          renderList();
          
          if (state.currentSelectedMedId) {
            const selectedMed = state.medList.find(m => m.id === state.currentSelectedMedId);
            if (selectedMed) {
              openCameraView(selectedMed.id, selectedMed.title);
              return;
            }
          }
          switchView('task-view');
        } else {
          switchView('error-view');
        }
      } catch (error) {
        console.error('通信エラー:', error);
        switchView('error-view');
      }
    }

    // リスト描画
    function renderList() {
      const container = document.getElementById('med-list-container');
      container.innerHTML = '';
      
      state.medList.forEach(med => {
        const todayStr = new Date().toISOString().slice(0, 10);
        const isCompletedToday = localStorage.getItem(`done_${med.id}_${todayStr}`);
        
        const card = document.createElement('div');
        card.className = 'med-card';
        
        if (isCompletedToday && med.limitType === '1日1回') {
          card.innerHTML = `
            <h3>✅ ${med.title}</h3>
            <p style="color: #2ecc71; font-weight: bold;">今日はもう のんだよ！</p>
          `;
        } else {
          card.innerHTML = `
            <h3>💊 ${med.title}</h3>
            <p style="font-size: 0.9rem; color: #7f8c8d;">(${med.time} の おくすり)</p>
            <button class="btn btn-camera" style="padding:10px 20px; font-size:1.1rem; width:auto;" 
              onclick="openCameraView('${med.id}', '${med.title}')">のんだよ！📸</button>
          `;
        }
        container.appendChild(card);
      });
    }

    // カメラ画面へ遷移
    function openCameraView(medId, medTitle) {
      state.currentSelectedMedId = medId;
      document.getElementById('target-med-title').innerText = medTitle;
      switchView('camera-view');
    }

    // カメラ撮影後の処理
    document.getElementById('camera-input').addEventListener('change', async function(e) {
      const file = e.target.files[0];
      if (!file) return;

      switchView('sending-view');

      const postDataUrl = `${GAS_URL}?action=log&id=${state.currentSelectedMedId}&name=${encodeURIComponent('ユーザー')}`;
      const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 8000));
      const fetchPromise = fetch(postDataUrl, { method: 'POST', mode: 'no-cors' });

      try {
        await Promise.race([fetchPromise, timeoutPromise]);

        // ローカルストレージに記憶
        const todayStr = new Date().toISOString().slice(0, 10);
        localStorage.setItem(`done_${state.currentSelectedMedId}_${todayStr}`, 'true');

        // ガチャを引いて結果を表示
        const gachaResult = drawGacha();
        const messageBox = document.getElementById('child-message-box');
        
        if (gachaResult.rarity === 'UR') {
          messageBox.style.backgroundColor = '#ffd700';
          messageBox.style.color = '#d35400';
          messageBox.style.border = '4px solid #ff4500';
        } else if (gachaResult.rarity === 'SR') {
          messageBox.style.backgroundColor = '#f8c471';
          messageBox.style.color = '#c0392b';
          messageBox.style.border = '2px solid #e67e22';
        } else {
          messageBox.style.backgroundColor = '#fff3e0';
          messageBox.style.color = '#e67e22';
          messageBox.style.border = 'none';
        }
        
        messageBox.innerHTML = `<strong>${gachaResult.text}</strong>`;

        switchView('complete-view');
        
        if (navigator.vibrate) {
          navigator.vibrate([100, 50, 100, 50, 200]);
        }
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });

      } catch (error) {
        console.error('送信エラー:', error);
        switchView('error-view');
      } finally {
        e.target.value = '';
      }
    });
  </script>
</body>
</html>
